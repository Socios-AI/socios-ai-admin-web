name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Contract PDF rendering test launches headless Chromium; ensure the
      # browser and its system libs are present on the CI runner.
      - run: npx playwright install --with-deps chromium
      - run: npm run verify:deps
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
