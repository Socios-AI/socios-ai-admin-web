name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run verify:deps
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_COOKIE_DOMAIN=.sociosai.com
            NEXT_PUBLIC_COOKIE_SAMESITE=lax
            NEXT_PUBLIC_COOKIE_SECURE=true
          tags: |
            ghcr.io/socios-ai/socios-ai-admin-web:latest
            ghcr.io/socios-ai/socios-ai-admin-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOYSERVER_HOST }}
          username: ${{ secrets.DEPLOYSERVER_USER }}
          key: ${{ secrets.DEPLOYSERVER_SSH_KEY }}
          script: |
            cd /opt/socios-ai-admin-web
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull
            docker compose up -d --force-recreate web
            docker image prune -f

      - name: Post-deploy smoke
        # Validates that the middleware actually runs after the deploy.
        # If the runtime can't load the middleware (Edge bypass, broken
        # import, etc.) we get HTTP 200 with app HTML instead of the 307
        # redirect. Marks the workflow failed so the operator can react.
        # Background: 2026-05-06 P0 incident · admin-web Edge bypass.
        env:
          SMOKE_URL: https://admin.sociosai.com/
          EXPECTED_REDIRECT_HOST: id.sociosai.com
        run: |
          set -euo pipefail

          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-redirs 0 "$SMOKE_URL" 2>/dev/null || echo "000")
            if [ "$code" != "000" ] && [ "$code" != "502" ] && [ "$code" != "503" ] && [ "$code" != "504" ]; then
              echo "container responding (HTTP $code after $((i*2 - 2))s)"
              break
            fi
            if [ "$i" = "30" ]; then
              echo "::error::container never came up (last HTTP code: $code)"
              exit 1
            fi
            sleep 2
          done

          code=$(curl -s -o /dev/null -w "%{http_code}" --max-redirs 0 "$SMOKE_URL")
          if [ "$code" != "307" ] && [ "$code" != "302" ]; then
            echo "::error::expected 307/302 from $SMOKE_URL when unauthenticated, got HTTP $code · middleware not running?"
            exit 1
          fi

          location=$(curl -sI --max-redirs 0 "$SMOKE_URL" | awk 'tolower($1) == "location:" { print $2 }' | tr -d '\r')
          case "$location" in
            *"$EXPECTED_REDIRECT_HOST"*)
              echo "smoke OK: middleware redirected to $location"
              ;;
            *)
              echo "::error::middleware redirect does not point to $EXPECTED_REDIRECT_HOST (got: $location)"
              exit 1
              ;;
          esac
